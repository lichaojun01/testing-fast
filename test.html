<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">测试银行内部信贷利率计算器</h1>
    
    <div class="bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-xl font-semibold mb-4">测试结果</h2>
        
        <div id="test-results" class="space-y-4">
            <!-- 测试结果将在这里显示 -->
        </div>
    </div>

    <script>
        // 测试函数
        function runTests() {
            const results = document.getElementById('test-results');
            results.innerHTML = '';
            
            // 测试1: 验证 calculateDailyInterest 函数是否正确返回
            try {
                // 模拟 calculateDailyInterest 函数的逻辑
                function testCalculateDailyInterest() {
                    const principal = 100000;
                    const withdrawalAmount = 50000;
                    const withdrawalDays = 30;
                    const dailyRate = 0.0435 / 365;
                    
                    const schedule = [];
                    const interest = withdrawalAmount * dailyRate * withdrawalDays;
                    const totalPayment = withdrawalAmount + interest;
                    
                    schedule.push({
                        period: 1,
                        paymentDate: '',
                        payment: totalPayment,
                        principal: withdrawalAmount,
                        interest: interest,
                        remainingPrincipal: principal - withdrawalAmount,
                        calculationExplanation: {
                            payment: `还款总额 = 提款金额 + 利息 = ¥ 50,000.00 + ¥ ${interest.toFixed(2)} = ¥ ${totalPayment.toFixed(2)}`,
                            interest: `利息 = 提款金额×日利率×提款天数 = ¥ 50,000.00×${(dailyRate * 100).toFixed(6)}%×30 = ¥ ${interest.toFixed(2)}`,
                            principal: `本金 = 提款金额 = ¥ 50,000.00`,
                            remainingPrincipal: `剩余本金 = 贷款本金 - 提款金额 = ¥ 100,000.00 - ¥ 50,000.00 = ¥ 50,000.00`
                        }
                    });
                    
                    return {
                        method: '按日计息随借随还',
                        totalPayment: totalPayment,
                        totalInterest: interest,
                        schedule: schedule,
                        withdrawalDays: withdrawalDays
                    };
                }
                
                const result = testCalculateDailyInterest();
                
                if (result && result.method === '按日计息随借随还') {
                    addTestResult('✅ 测试1通过: calculateDailyInterest 函数正确返回结果', 'success');
                } else {
                    addTestResult('❌ 测试1失败: calculateDailyInterest 函数返回结果不正确', 'error');
                }
            } catch (error) {
                addTestResult(`❌ 测试1失败: ${error.message}`, 'error');
            }
            
            // 测试2: 验证输入验证逻辑
            try {
                const loanData = {
                    amount: 100000,
                    amountUnit: 'yuan',
                    term: 12,
                    termUnit: 'month',
                    annualRate: 4.35,
                    repaymentMethod: 'equal-principal-interest',
                    firstPaymentDate: '2025-12-25',
                    paymentFrequency: 'monthly',
                    withdrawalAmount: 50000,
                    withdrawalDays: 30
                };
                
                let isValid = true;
                
                // 验证贷款金额
                if (loanData.amount <= 0) {
                    isValid = false;
                }
                
                // 验证贷款期限
                if (loanData.term <= 0) {
                    isValid = false;
                }
                
                // 验证年利率
                if (loanData.annualRate <= 0) {
                    isValid = false;
                }
                
                // 验证首次还款日期
                if (!loanData.firstPaymentDate) {
                    isValid = false;
                }
                
                if (isValid) {
                    addTestResult('✅ 测试2通过: 输入验证逻辑正确', 'success');
                } else {
                    addTestResult('❌ 测试2失败: 输入验证逻辑有误', 'error');
                }
            } catch (error) {
                addTestResult(`❌ 测试2失败: ${error.message}`, 'error');
            }
            
            // 测试3: 验证日期计算
            try {
                const firstDate = '2025-12-25';
                const term = 12;
                const frequency = 'monthly';
                
                function generateTestPaymentDates(firstDate, term, frequency) {
                    const dates = [];
                    const firstPaymentDate = new Date(firstDate);
                    
                    dates.push(firstPaymentDate);
                    
                    for (let i = 1; i < term; i++) {
                        const nextDate = new Date(firstPaymentDate);
                        
                        switch (frequency) {
                            case 'monthly':
                                nextDate.setMonth(firstPaymentDate.getMonth() + i);
                                break;
                            case 'quarterly':
                                nextDate.setMonth(firstPaymentDate.getMonth() + i * 3);
                                break;
                            case 'semi-annually':
                                nextDate.setMonth(firstPaymentDate.getMonth() + i * 6);
                                break;
                            case 'annually':
                                nextDate.setFullYear(firstPaymentDate.getFullYear() + i);
                                break;
                            default:
                                nextDate.setMonth(firstPaymentDate.getMonth() + i);
                        }
                        
                        dates.push(nextDate);
                    }
                    
                    return dates;
                }
                
                const dates = generateTestPaymentDates(firstDate, term, frequency);
                
                if (dates.length === term) {
                    addTestResult('✅ 测试3通过: 日期计算逻辑正确', 'success');
                } else {
                    addTestResult('❌ 测试3失败: 日期计算逻辑有误', 'error');
                }
            } catch (error) {
                addTestResult(`❌ 测试3失败: ${error.message}`, 'error');
            }
        }
        
        function addTestResult(message, type) {
            const results = document.getElementById('test-results');
            const div = document.createElement('div');
            div.className = `p-3 rounded ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // 页面加载后运行测试
        document.addEventListener('DOMContentLoaded', function() {
            runTests();
        });
    </script>
</body>
</html>
